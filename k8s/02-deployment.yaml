apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-deployment
  namespace: default
  labels:
    app: saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saas
  template:
    metadata:
      labels:
        app: saas
    spec:
      volumes:
        - name: shared-static-vol
          emptyDir: {}
        - name: nginx-conf-vol
          configMap:
            name: saas-nginx-conf
      imagePullSecrets:
        - name: ghcr-cred
      initContainers:
        - name: django-migrate
          image: ghcr.io/maximo-vazquez/ventasoftware:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: BlogInformatorio.settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DEBUG
              value: "False"
            - name: ES_PRODUCCION
              value: "True"
            - name: TENANT_MANAGEMENT_API_BASE_URL
              value: "https://pago.indutienda.com"
            - name: USE_S3_MEDIA
              value: "true"
            - name: AWS_S3_ENDPOINT_URL
              value: "https://s3.indutienda.com"
            - name: AWS_STORAGE_BUCKET_NAME
              value: "media"
            - name: AWS_S3_REGION_NAME
              value: "us-east-1"
            - name: AWS_S3_SIGNATURE_VERSION
              value: "s3v4"
            - name: AWS_S3_ADDRESSING_STYLE
              value: "path"
            - name: AWS_QUERYSTRING_AUTH
              value: "true"
            - name: AWS_QUERYSTRING_EXPIRE
              value: "3600"
            - name: AWS_S3_FILE_OVERWRITE
              value: "false"
            - name: AWS_MEDIA_LOCATION
              value: "saas"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-app-credentials
                  key: saasAccessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-app-credentials
                  key: saasSecretKey
            - name: DB_NAME
              value: software_venta
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: password
      containers:
        - name: django-app
          image: ghcr.io/maximo-vazquez/ventasoftware:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args:
            - |
              python manage.py collectstatic --noinput && \
              gunicorn BlogInformatorio.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: BlogInformatorio.settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DEBUG
              value: "False"
            - name: ES_PRODUCCION
              value: "True"
            - name: TENANT_MANAGEMENT_API_BASE_URL
              value: "https://pago.indutienda.com"
            - name: USE_S3_MEDIA
              value: "true"
            - name: AWS_S3_ENDPOINT_URL
              value: "https://s3.indutienda.com"
            - name: AWS_STORAGE_BUCKET_NAME
              value: "media"
            - name: AWS_S3_REGION_NAME
              value: "us-east-1"
            - name: AWS_S3_SIGNATURE_VERSION
              value: "s3v4"
            - name: AWS_S3_ADDRESSING_STYLE
              value: "path"
            - name: AWS_QUERYSTRING_AUTH
              value: "true"
            - name: AWS_QUERYSTRING_EXPIRE
              value: "3600"
            - name: AWS_S3_FILE_OVERWRITE
              value: "false"
            - name: AWS_MEDIA_LOCATION
              value: "saas"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-app-credentials
                  key: saasAccessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-app-credentials
                  key: saasSecretKey
            - name: DB_NAME
              value: software_venta
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials-saas
                  key: password
          volumeMounts:
            - name: shared-static-vol
              mountPath: /app/staticfiles/type2

        - name: nginx-sidecar
          image: nginx:alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: shared-static-vol
              mountPath: /var/www/static
            - name: nginx-conf-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

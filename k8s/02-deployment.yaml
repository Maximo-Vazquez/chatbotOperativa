apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-operativa-deployment
  namespace: default
  labels:
    app: chatbot-operativa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-operativa
  template:
    metadata:
      labels:
        app: chatbot-operativa
    spec:
      volumes:
        - name: shared-static-vol
          emptyDir: {}
        - name: nginx-conf-vol
          configMap:
            name: chatbot-operativa-nginx-conf
      imagePullSecrets:
        - name: ghcr-cred
      initContainers:
        - name: django-migrate
          image: ghcr.io/maximo-vazquez/chatbotoperativa:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: BlogInformatorio.settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_DEBUG
              value: "false"
            - name: DJANGO_ALLOWED_HOSTS
              value: "ia.indutienda.com"
            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: "https://ia.indutienda.com"
            - name: DB_ENGINE
              value: "django.db.backends.postgresql"
            - name: DB_NAME
              value: chatbot
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: password
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: chatbot-operativa-app-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatbot-operativa-app-secrets
                  key: GOOGLE_CLIENT_SECRET
      containers:
        - name: django-app
          image: ghcr.io/maximo-vazquez/chatbotoperativa:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args:
            - |
              python manage.py collectstatic --noinput && \
              gunicorn BlogInformatorio.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: BlogInformatorio.settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_DEBUG
              value: "false"
            - name: DJANGO_ALLOWED_HOSTS
              value: "ia.indutienda.com"
            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: "https://ia.indutienda.com"
            - name: DB_ENGINE
              value: "django.db.backends.postgresql"
            - name: DB_NAME
              value: chatbot
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials-chatbot
                  key: password
            - name: APP_VERSION
              value: "latest"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: chatbot-operativa-app-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatbot-operativa-app-secrets
                  key: GOOGLE_CLIENT_SECRET
          volumeMounts:
            - name: shared-static-vol
              mountPath: /app/staticfiles

        - name: nginx-sidecar
          image: nginx:alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: shared-static-vol
              mountPath: /var/www/static
            - name: nginx-conf-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
